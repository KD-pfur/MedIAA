<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200">
  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf7f0"/>
      <stop offset="100%" stop-color="#f1ebdf"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#8d7f61" flood-opacity="0.16"/>
    </filter>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="2200" fill="#d9cfb5"/>
  <rect x="110" y="90" width="1380" height="1980" rx="28" fill="url(#paper)" filter="url(#softShadow)"/>
  <rect x="110" y="90" width="1380" height="1980" rx="28" fill="#000" opacity="0.02" filter="url(#paperNoise)"/>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#2b2b2b">
    <text x="800" y="195" text-anchor="middle" font-size="36" font-weight="700">Городская клиника N7</text>
    <text x="800" y="238" text-anchor="middle" font-size="22">Выписка из амбулаторной карты</text>

    <line x1="180" y1="285" x2="1420" y2="285" stroke="#8d8573" stroke-width="1.5"/>

    <text x="180" y="350" font-size="30" font-weight="700">Пациент:</text>
    <text x="380" y="350" font-size="30">Соколов Артем Игоревич</text>

    <text x="180" y="402" font-size="30" font-weight="700">Дата рождения:</text>
    <text x="455" y="402" font-size="30">22.11.1998</text>

    <text x="830" y="402" font-size="30" font-weight="700">Дата документа:</text>
    <text x="1125" y="402" font-size="30">14.03.2026</text>

    <text x="180" y="454" font-size="30" font-weight="700">Медицинская организация:</text>
    <text x="610" y="454" font-size="30">Городская клиника N7</text>

    <text x="180" y="506" font-size="30" font-weight="700">Врач:</text>
    <text x="300" y="506" font-size="30">Смирнова Елена Павловна</text>

    <text x="180" y="595" font-size="32" font-weight="700">Жалобы</text>
    <text x="180" y="642" font-size="29">жажда, сухость во рту, учащенное мочеиспускание, слабость</text>

    <text x="180" y="735" font-size="32" font-weight="700">Диагноз</text>
    <text x="180" y="782" font-size="29">Сахарный диабет 2 типа. Ожирение 1 степени.</text>

    <text x="180" y="875" font-size="32" font-weight="700">Лабораторные результаты</text>

    <g font-size="28">
      <text x="180" y="930">Глюкоза - 9.2 ммоль/л (норма 3.9-5.5)</text>
      <text x="180" y="980">HbA1c - 8.1 % (норма 4.0-5.6)</text>
      <text x="180" y="1030">Холестерин общий - 6.1 ммоль/л (норма 0-5.2)</text>
      <text x="180" y="1080">Триглицериды - 2.4 ммоль/л (норма 0-1.7)</text>
      <text x="180" y="1130">Креатинин - 91 мкмоль/л (норма 62-106)</text>
    </g>

    <text x="180" y="1235" font-size="32" font-weight="700">Назначения</text>

    <g font-size="28">
      <text x="180" y="1290">Метформин 1000 мг 2 раза в день после еды 30 дней</text>
      <text x="180" y="1340">Розувастатин 10 мг 1 раз в день вечером 30 дней</text>
      <text x="180" y="1390">Контроль глюкозы крови 2 раза в день</text>
    </g>

    <text x="180" y="1495" font-size="32" font-weight="700">Рекомендации</text>

    <g font-size="28">
      <text x="180" y="1550">Соблюдение диеты с ограничением быстрых углеводов.</text>
      <text x="180" y="1600">Повторный анализ HbA1c через 3 месяца.</text>
      <text x="180" y="1650">Консультация эндокринолога в плановом порядке.</text>
    </g>
  </g>

  <g opacity="0.2">
    <ellipse cx="1220" cy="1760" rx="150" ry="90" fill="none" stroke="#3f6ab2" stroke-width="8"/>
    <ellipse cx="1220" cy="1760" rx="118" ry="63" fill="none" stroke="#3f6ab2" stroke-width="4"/>
    <text x="1220" y="1768" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#3f6ab2">ПЕЧАТЬ</text>
  </g>

  <g transform="rotate(-4 1250 1820)" opacity="0.8" font-family="'Comic Sans MS', cursive" fill="#204f9a">
    <text x="1030" y="1840" font-size="34">Смирнова Е.П.</text>
  </g>
</svg>
